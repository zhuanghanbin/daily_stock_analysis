name: 每日自动选股 + 分析

on:
  schedule:
    # 工作日早上 8:30 自动选股（北京时间 8:30 = UTC 0:30）
    - cron: '30 0 * * 1-5'
  workflow_dispatch:
    inputs:
      max_stocks:
        description: '最多筛选股票数'
        required: false
        default: '20'

jobs:
  stock-picker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install akshare pandas
      
      - name: Run stock picker
        run: python stock_picker.py
      
      - name: Read stock list
        id: stock-list
        run: |
          STOCK_LIST=$(grep "^STOCK_LIST=" selected_stocks.txt | cut -d= -f2)
          echo "stock_list=$STOCK_LIST" >> $GITHUB_OUTPUT
          echo "📋 选股结果: $STOCK_LIST"
      
      - name: Show detail results
        run: cat selected_stocks_detail.csv

  daily-analysis:
    needs: stock-picker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set stock list from picker
        env:
          STOCK_LIST: ${{ needs.stock-picker.outputs.stock_list }}
        run: |
          echo "STOCK_LIST=$STOCK_LIST" >> $GITHUB_ENV
      
      - name: Run daily analysis
        uses: ./
        with:
          python-version: '3.11'
        env:
          STOCK_LIST: ${{ env.STOCK_LIST }}
